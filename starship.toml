# Pokemon Kawaii Prompt
# https://starship.rs/config/

command_timeout = 10000

format = """
[  ●´Å`) ~ $directory  ⌥ $branch $git_status  ~ ](bold yellow)
$character
"""

[character]
success_symbol = "[ ٩(ᵔᴥᵔ)۶ ](bold yellow)"
error_symbol = "[ ٩(´Å`)۶ ](bold red)"

[directory]
style = "bold yellow"
truncation_length = 3
truncate_to_repo = true
format = "[ ●´Å`) ~ $path ]($style) "

[git_branch]
symbol = " ⌥ "
style = "bold blue"
format = "[$symbol$branch]($style)"

[git_status]
style = "bold yellow"
format = "[$all_status$ahead$behind]($style) "
ahead = "⬆${count}"
behind = "⬇${count}"
modified = "⚠"
untracked = "+"
deleted = "✘"

[python]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[line_break]
disabled = false